<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบจองห้องประชุม | โรงเรียนสกลราชวิทยานุกูล</title>
<link rel="icon" type="image/png" href="https://sakolraj.ac.th/wp-content/uploads/2024/06/SKR-logo-T.png">

<!-- Bootstrap -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<!-- SweetAlert2 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.8/sweetalert2.all.min.js" defer></script>
<!-- Chart.js (local) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" defer></script>
<!-- html2canvas (สำหรับแปลงหน้าจอรายงานภาษาไทยเป็นรูปภาพความละเอียดสูงลง PDF ป้องกันฟอนต์ต่างดาว) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<!-- SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<!-- Sarabun Font -->
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy: #0e2a4a;
  --navy-deep: #081a30;
  --gold: #d9a440;
  --gold-soft: #f3e2bb;
  --cream: #f7f5ef;
  --ink: #1c2733;
  --muted: #7a8694;
  --line: #e7e4dc;
  --green: #2f8f5b;
  --amber: #d98a1f;
  --red: #c1493e;
  --radius: 14px;
  --font-display: 'Kanit', 'Sarabun', sans-serif;
  --font-body: 'Sarabun', sans-serif;
}

*{box-sizing:border-box;}
body{
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  margin:0;
}

/* ===================== LOGIN SCREEN ===================== */
.login-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 55%, #1a3a60 100%);
  position:relative;
  overflow:hidden;
  padding:24px;
}
.login-bg-shape{
  position:absolute;
  width:900px;height:900px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(217,164,64,0.18) 0%, transparent 70%);
  top:-300px; right:-300px;
}
.login-bg-shape::after{
  content:"";
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(217,164,64,0.10) 0%, transparent 70%);
  bottom:-250px; left:-200px;
}
.login-card{
  position:relative;
  z-index:2;
  background:#fff;
  border-radius: 20px;
  width:100%;
  max-width:430px;
  padding: 40px 36px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.35);
}
.login-brand{ text-align:center; margin-bottom: 28px; }
.login-logo{
  margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
}
.login-logo img {
  width: 80px;
  height: auto;
}
.login-title{
  font-family: var(--font-display);
  font-weight:700;
  font-size: 24px;
  color: var(--navy);
  letter-spacing: 1px;
  margin:0;
}
.login-title span{ color: var(--gold); }
.login-sub{
  color: var(--muted);
  font-size: 14px;
  margin-top: 4px;
}
.login-form .form-label{ font-size:13px; font-weight:600; color:var(--navy); }
.login-form .input-group-text{ background:var(--cream); border-right:none; color:var(--muted); }
.login-form .form-control{ border-left:none; padding:10px 12px; }
.login-form .input-group-text + .form-control{ border-left:none; }
.login-form .input-group:focus-within{ box-shadow:0 0 0 3px rgba(14,42,74,0.08); border-radius:8px; }
.btn-login{
  background: var(--navy);
  color:#fff;
  font-weight:600;
  padding:11px;
  border-radius:10px;
  border:none;
  margin-top:6px;
  transition:.2s;
}
.btn-login:hover{ background:#163a63; color:#fff; }
.login-demo{
  margin-top:24px;
  padding-top:18px;
  border-top:1px dashed var(--line);
  font-size:12.5px;
  color:var(--muted);
}
.btn-demo{
  font-size:11.5px;
  border:1px solid var(--line);
  background:var(--cream);
  color:var(--navy);
  border-radius:8px;
  padding:5px 10px;
}
.btn-demo:hover{ background:var(--gold-soft); border-color:var(--gold); }

/* ===================== APP SHELL ===================== */
.app-shell{ display:flex; min-height:100vh; }

.sidebar{
  width:260px;
  background: var(--navy);
  color:#fff;
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0; bottom:0;
  z-index:1030;
  transition: transform .25s ease;
}
.sidebar-brand{
  display:flex; align-items:center; gap:12px;
  padding:22px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.sidebar-logo{
  width:42px;height:42px;border-radius:11px;
  background: linear-gradient(135deg, var(--gold), #c98a2c);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
.sb-title{ font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:1px;}
.sb-sub{ font-size:11px; color: rgba(255,255,255,0.55);}

.sidebar-nav{ flex:1; padding:14px 12px; overflow-y:auto; }
.nav-link-item{
  display:flex; align-items:center; gap:12px;
  padding:11px 14px;
  border-radius:10px;
  color: rgba(255,255,255,0.75);
  text-decoration:none;
  font-size:14.5px;
  font-weight:500;
  margin-bottom:4px;
  cursor:pointer;
  transition:.15s;
  border:1px solid transparent;
}
.nav-link-item i{ font-size:17px; width:20px; text-align:center; }
.nav-link-item:hover{ background: rgba(255,255,255,0.06); color:#fff; }
.nav-link-item.active{
  background: rgba(217,164,64,0.15);
  color: var(--gold);
  border-color: rgba(217,164,64,0.3);
}
.nav-section-label{
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color: rgba(255,255,255,0.35);
  padding: 14px 14px 6px;
  font-weight:700;
}
.nav-badge{
  margin-left:auto;
  background: var(--red);
  color:#fff;
  font-size:10.5px;
  font-weight:700;
  border-radius:20px;
  padding:1px 7px;
  min-width:20px;
  text-align:center;
}

.sidebar-footer{ padding:16px; border-top:1px solid rgba(255,255,255,0.08); }
.btn-logout{
  background: rgba(255,255,255,0.06);
  color:#fff;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  padding:10px;
  font-size:14px;
  font-weight:500;
}
.btn-logout:hover{ background: var(--red); border-color:var(--red); color:#fff; }

.main-area{
  margin-left:260px;
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  transition: margin-left .25s ease;
}

.topbar{
  height:68px;
  background:#fff;
  border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:14px;
  padding:0 24px;
  position:sticky; top:0; z-index:1020;
}
.topbar-title{
  font-family:var(--font-display);
  font-weight:600;
  font-size:19px;
  color:var(--navy);
  flex:1;
}
.topbar-user{ display:flex; align-items:center; gap:10px; }
.tu-name{ font-size:13.5px; font-weight:700; color:var(--navy); }
.tu-role{ font-size:11.5px; color:var(--muted); }
.tu-avatar{
  width:40px;height:40px;border-radius:50%;
  background: var(--gold-soft);
  color:var(--navy);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
}
.btn-icon{ border:1px solid var(--line); background:#fff; border-radius:10px; width:40px; height:40px; }

.content{ padding:24px; flex:1; }

@media (max-width: 991.98px){
  .sidebar{ transform: translateX(-100%); }
  .sidebar.show{ transform: translateX(0); }
  .main-area{ margin-left:0; }
}

/* ===================== PANELS / CARDS ===================== */
.panel{
  background:#fff;
  border-radius: var(--radius);
  border:1px solid var(--line);
  margin-bottom:0;
}
.panel-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 18px;
  border-bottom:1px solid var(--line);
}
.panel-head h6{
  margin:0; font-weight:700; color:var(--navy); font-size:15px;
  display:flex; align-items:center; gap:8px;
}
.panel-body{ padding:18px; }

.page-fade{ animation: fadeIn .35s ease; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

/* Stat Cards */
.stat-card{
  border-radius: var(--radius);
  padding:18px;
  color:#fff;
  position:relative;
  overflow:hidden;
  min-height:110px;
}
.stat-1{ background: linear-gradient(135deg, #0e2a4a, #1f4a7a); }
.stat-2{ background: linear-gradient(135deg, #c98a2c, #e0ab4f); }
.stat-3{ background: linear-gradient(135deg, #277a52, #3aa873); }
.stat-4{ background: linear-gradient(135deg, #a83f35, #c75c50); }
.stat-icon{ font-size:24px; opacity:.85; margin-bottom:8px; }
.stat-num{ font-family:var(--font-display); font-size:28px; font-weight:700; line-height:1; }
.stat-label{ font-size:12.5px; opacity:.9; margin-top:4px; }

/* Table */
.table{ font-size:13.5px; }
.table thead th{
  background: var(--cream);
  color: var(--navy);
  font-weight:700;
  font-size:12.5px;
  text-transform:uppercase;
  letter-spacing:.5px;
  border-bottom:none;
  white-space:nowrap;
}
.table td{ vertical-align:middle; }

/* Status Badges */
.badge-status{
  font-size:11.5px;
  font-weight:700;
  padding:5px 12px;
  border-radius:20px;
  display:inline-flex; align-items:center; gap:5px;
}
.badge-pending{ background:#fdf1de; color:var(--amber); }
.badge-approved{ background:#e3f4e9; color:var(--green); }
.badge-cancelled{ background:#fbeae8; color:var(--red); }

/* Buttons */
.btn-primary-soft{
  background: var(--navy);
  color:#fff; border:none;
  border-radius:10px;
  font-weight:600;
  padding:9px 18px;
  font-size:14px;
}
.btn-primary-soft:hover{ background:#163a63; color:#fff; }
.btn-export-pdf{ background:#c1493e; color:#fff; border:none; border-radius:8px; font-weight:600;}
.btn-export-excel{ background:#2f8f5b; color:#fff; border:none; border-radius:8px; font-weight:600;}
.btn-export-print{ background:var(--navy); color:#fff; border:none; border-radius:8px; font-weight:600;}
.btn-export-pdf:hover, .btn-export-excel:hover, .btn-export-print:hover{ color:#fff; opacity:.9; }

.btn-action{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:14px;
  margin-left:4px;
  transition:.15s;
}
.btn-action.act-approve{ color:var(--green); border-color:#c9ead4; }
.btn-action.act-approve:hover{ background:var(--green); color:#fff; }
.btn-action.act-cancel{ color:var(--red); border-color:#f3cfca; }
.btn-action.act-cancel:hover{ background:var(--red); color:#fff; }
.btn-action.act-edit{ color:var(--navy); border-color:#cfd9e6; }
.btn-action.act-edit:hover{ background:var(--navy); color:#fff; }
.btn-action.act-view{ color:var(--muted); }
.btn-action.act-view:hover{ background:var(--muted); color:#fff; }

/* Equipment chips */
.equip-grid{ display:flex; flex-wrap:wrap; gap:10px; }
.equip-chip{ cursor:pointer; }
.equip-chip input{ display:none; }
.equip-chip span{
  display:flex; align-items:center; gap:6px;
  border:1.5px solid var(--line);
  border-radius:10px;
  padding:8px 14px;
  font-size:13.5px;
  font-weight:500;
  color: var(--muted);
  transition:.15s;
}
.equip-chip input:checked + span{
  border-color: var(--gold);
  background: var(--gold-soft);
  color: var(--navy);
}

/* Room cards */
.room-card{
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px;
  height:100%;
  transition:.15s;
}
.room-card:hover{ box-shadow: 0 6px 18px rgba(14,42,74,0.08); transform:translateY(-2px); }
.room-card-icon{
  width:42px;height:42px;border-radius:10px;
  background:var(--gold-soft); color:var(--navy);
  display:flex;align-items:center;justify-content:center;
  font-size:19px; margin-bottom:10px;
}
.room-card h6{ font-weight:700; color:var(--navy); margin-bottom:2px; }
.room-card .meta{ font-size:12.5px; color:var(--muted); }

/* Empty state */
.empty-state{
  text-align:center;
  padding:50px 20px;
  color:var(--muted);
}
.empty-state i{ font-size:42px; opacity:.4; margin-bottom:10px; display:block; }

/* misc */
.admin-only, .admin-only-block{ }
.form-label{ font-weight:600; font-size:13.5px; color:var(--navy); }
.form-label-sm{ font-weight:600; font-size:12px; color:var(--navy); margin-bottom:4px;}

/* Print styles */
@media print{
  .sidebar, .topbar, .panel-head, .no-print{ display:none !important; }
  .main-area{ margin-left:0; }
  .content{ padding:0; }
  .panel{ border:none; }
  #reportHeaderPrint{ display:block !important; }
}

/* ===================== CALENDAR ===================== */
.cal-month-label{
  font-family: var(--font-display);
  font-weight:700;
  font-size:16px;
  color:var(--navy);
  min-width:140px;
  text-align:center;
}
.cal-legend{ display:flex; gap:18px; flex-wrap:wrap; font-size:13px; color:var(--muted); }
.cal-legend-item{ display:flex; align-items:center; gap:6px; }
.cal-dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }
.dot-pending{ background:var(--amber); }
.dot-approved{ background:var(--green); }
.dot-cancelled{ background:var(--red); }

.cal-grid{
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:6px;
}
.cal-dow{
  text-align:center;
  font-size:12px;
  font-weight:700;
  color:var(--navy);
  padding:6px 0;
  text-transform:uppercase;
}
.cal-cell{
  border:1px solid var(--line);
  border-radius:10px;
  min-height:115px;
  padding:6px;
  cursor:pointer;
  transition:.15s;
  display:flex;
  flex-direction:column;
  gap:4px;
  background:#fff;
}
.cal-cell:hover{ border-color: var(--gold); box-shadow:0 4px 10px rgba(217,164,64,0.15); }
.cal-cell.cal-empty{ background:transparent; border:none; cursor:default; }
.cal-cell.cal-empty:hover{ box-shadow:none; }
.cal-cell.cal-today{ border-color: var(--navy); background: var(--cream); }
.cal-cell.cal-selected{ border-color: var(--gold); background: var(--gold-soft); box-shadow:0 4px 10px rgba(217,164,64,0.2); }
.cal-date-num{ font-size:13px; font-weight:700; color:var(--navy); }
.cal-empty .cal-date-num{ color:var(--muted); opacity:.4; }
.cal-dots{ display:flex; gap:3px; flex-wrap:wrap; margin-top:auto; }
.cal-dots .cal-dot{ width:8px; height:8px; }
.cal-more{ font-size:10.5px; color:var(--muted); }

@media (max-width: 575.98px){
  .cal-cell{ min-height:75px; padding:4px; }
  .cal-date-num{ font-size:11px; }
}

/* ===================== DETAIL MODAL ===================== */
.detail-hero{
  background: linear-gradient(135deg, var(--navy), #1f4a7a);
  color:#fff;
  padding:22px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.detail-hero .dh-room{
  font-family: var(--font-display);
  font-weight:700;
  font-size:19px;
  display:flex;
  align-items:center;
  gap:10px;
}
.detail-hero .dh-meta{
  font-size:12.5px;
  color: rgba(255,255,255,0.7);
  margin-top:2px;
}
.detail-datetime{
  display:flex;
  gap:12px;
  padding:16px 22px;
  border-bottom:1px solid var(--line);
}
.dt-block{
  flex:1;
  background: var(--cream);
  border-radius:12px;
  padding:12px 14px;
  text-align:center;
}
.dt-block .dt-icon{ font-size:20px; color:var(--gold); margin-bottom:4px; }
.dt-block .dt-label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.dt-block .dt-value{ font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--navy); margin-top:2px; }

.detail-body-info{ padding: 16px 22px; }
.di-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  padding:9px 0;
  border-bottom:1px solid var(--line);
  font-size:13.5px;
}
.di-row:last-child{ border-bottom:none; }
.di-label{ color:var(--muted); font-weight:600; flex-shrink:0; display:flex; align-items:center; gap:6px; }
.di-value{ color:var(--ink); font-weight:600; text-align:right; }
.di-row.di-status{ align-items:center; }
.di-created{ font-size:11.5px; color:var(--muted); text-align:center; padding:10px 22px 16px; }

/* ===================== PHONE VALIDATION ===================== */
.is-invalid-phone{ border-color: var(--red) !important; }
.is-invalid-phone ~ .invalid-feedback{ display:block; }
.invalid-feedback{ display:none; font-size:12px; color:var(--red); }
.is-valid-phone{ border-color: var(--green) !important; }

/* Interactive cards on booking page */
.room-card-interactive {
  position: relative;
  overflow: hidden;
}
.room-card-interactive:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(14,42,74,0.12);
}

</style>
</head>
<body>

<!-- ========================= LOGIN SCREEN ========================= -->
<div id="loginScreen" class="login-screen">
  <div class="login-bg-shape"></div>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo"><img src="https://sakolraj.ac.th/wp-content/uploads/2024/06/SKR-logo-T.png" alt="SKR Logo"></div>
      <h1 class="login-title">SAKOLRAJ<span>BOOKING</span></h1>
      <p class="login-sub">ระบบจองห้องประชุม โรงเรียนสกลราชวิทยานุกูล</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="mb-3">
        <label class="form-label">ชื่อผู้ใช้งาน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" id="loginUsername" class="form-control" placeholder="เช่น admin / teacher1" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">รหัสผ่าน (เบอร์โทรศัพท์)</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="loginPassword" class="form-control" placeholder="กรอกเบอร์โทรศัพท์" required>
        </div>
      </div>
      <!-- Error message แบบ inline -->
      <div id="loginError" class="alert alert-danger d-none py-2 mb-3" role="alert" style="font-size:13.5px;">
        <i class="bi bi-exclamation-triangle-fill me-1"></i> <span id="loginErrorText"></span>
      </div>
      <button type="submit" class="btn btn-login w-100" id="loginBtn">
        <span id="loginBtnText">เข้าสู่ระบบ</span>
        <span id="loginBtnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
      </button>
    </form>

    <div class="login-demo">
      <p class="mb-1 fw-semibold"><i class="bi bi-info-circle"></i> บัญชีทดลองใช้งาน</p>
      <div class="d-flex flex-wrap gap-2 mt-2">
        <button class="btn btn-demo" data-user="admin" data-pass="0812345678">แอดมิน: admin / 0812345678</button>
        <button class="btn btn-demo" data-user="teacher1" data-pass="0898765432">ครู: teacher1 / 0898765432</button>
      </div>
    </div>
  </div>
</div>

<!-- ========================= APP SHELL ========================= -->
<div id="appShell" class="app-shell d-none">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo"><i class="bi bi-bank2"></i></div>

const DB = {
  async fetchGAS(action, payload = null) {
    if (!GAS_URL) return null;
    
    // เปลี่ยนมาใช้ x-www-form-urlencoded เพื่อแก้ปัญหา postData หายในบางเบราว์เซอร์
    const bodyParams = new URLSearchParams();
    if (payload !== null) {
      bodyParams.append("payload", JSON.stringify(payload));
    }
    
    const opts = { 
      method: "POST", 
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: bodyParams.toString() 
    };
    
    const res = await fetch(`${GAS_URL}?action=${action}`, opts);
    const json = await res.json();
    if (json.status === "success") return json.data;
    throw new Error(json.message);
  },
  
  async syncData() {
    if (!GAS_URL) return;
    try {
      const [users, rooms, bookings] = await Promise.all([
        this.fetchGAS("getUsers"),
        this.fetchGAS("getRooms"),
        this.fetchGAS("getBookings")
      ]);
      localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users));
      localStorage.setItem(DB_KEYS.ROOMS, JSON.stringify(rooms));
      localStorage.setItem(DB_KEYS.BOOKINGS, JSON.stringify(bookings));
    } catch(e) {
      console.error("Failed to sync from GAS:", e);
    }
  },

  async init(){
    const existingUsers = localStorage.getItem(DB_KEYS.USERS);
    if(!existingUsers || !existingUsers.includes("department")){
      localStorage.setItem(DB_KEYS.USERS, JSON.stringify(DEFAULT_USERS));
    }
    if(!localStorage.getItem(DB_KEYS.ROOMS)){
      localStorage.setItem(DB_KEYS.ROOMS, JSON.stringify(DEFAULT_ROOMS));
    }
    if(!localStorage.getItem(DB_KEYS.BOOKINGS)){
      localStorage.setItem(DB_KEYS.BOOKINGS, JSON.stringify(genDefaultBookings()));
    }
    // Sync data if GAS_URL is present
    await this.syncData();
  },

  getUsers(){ 
    const users = JSON.parse(localStorage.getItem(DB_KEYS.USERS) || "[]");
    return users.map(u => ({ ...u, fullname: u.fullname || u.name || '' }));
  },
  getRooms(){ 
    const rooms = JSON.parse(localStorage.getItem(DB_KEYS.ROOMS) || "[]"); 
    return rooms.map(r => ({ ...r, status: r.status || "available", building: r.building || '', floor: r.floor || '' }));
  },
  setRooms(rooms){ localStorage.setItem(DB_KEYS.ROOMS, JSON.stringify(rooms)); },
  getBookings(){ 
    const bookings = JSON.parse(localStorage.getItem(DB_KEYS.BOOKINGS) || "[]");
    const users = this.getUsers();
    return bookings.map(b => {
      if (!b.isExternal && b.userId) {
        const u = users.find(user => String(user.id) === String(b.userId));
        if (u) {
          b.department = u.department;
          b.bookerName = u.fullname || u.username;
          b.phone = u.phone;
        }
      }
      return b;
    });
  },
  setBookings(bookings){ localStorage.setItem(DB_KEYS.BOOKINGS, JSON.stringify(bookings)); },

  getSession(){ 
    const u = JSON.parse(localStorage.getItem(DB_KEYS.SESSION) || "null");
    if(u) u.fullname = u.fullname || u.name || '';
    return u;
  },
  setSession(user){ localStorage.setItem(DB_KEYS.SESSION, JSON.stringify(user)); },
  clearSession(){ localStorage.removeItem(DB_KEYS.SESSION); },

  async login(username, password){
    // Strip leading zeros for comparison (Google Sheets removes them)
    const normalizePhone = (p) => String(p || "").replace(/^0+/, "");
    const inputPhone = normalizePhone(password);

    if (GAS_URL) {
      const user = await this.fetchGAS("login", { username, password: inputPhone });
      if (user) { this.setSession(user); return user; }
      return null;
    }
    
    // Fallback: local localStorage
    const user = this.getUsers().find(u =>
      u.username === username &&
      normalizePhone(u.phone) === inputPhone
    );
    if(user){ this.setSession(user); return user; }
    return null;
  },

  nextId(arr){
    return arr.length ? Math.max(...arr.map(x => x.id)) + 1 : 1;
  },

  async addBooking(booking){
    booking.createdAt = new Date().toISOString();
    booking.status = "pending";
    if (GAS_URL) {
       const gasResult = await this.fetchGAS("addBooking", booking);
       if (gasResult && gasResult.id) booking.id = gasResult.id;
    } else {
       booking.id = this.nextId(this.getBookings());
    }
    const bookings = this.getBookings();
    bookings.push(booking);
    this.setBookings(bookings);
    return booking;
  },

  async updateBooking(id, data){
    if (GAS_URL) {
       await this.fetchGAS("updateBooking", { id, ...data });
    }
    const bookings = this.getBookings();
    const idx = bookings.findIndex(b => b.id === id);
    if(idx === -1) return null;
    bookings[idx] = { ...bookings[idx], ...data };
    this.setBookings(bookings);
    return bookings[idx];
  },

  async deleteBooking(id){
    if (GAS_URL) {
       await this.fetchGAS("deleteBooking", { id });
    }
    const bookings = this.getBookings().filter(b => b.id !== id);
    this.setBookings(bookings);
  },

  hasConflict(roomId, date, timeStart, timeEnd, excludeId = null){
    const bookings = this.getBookings();
    return bookings.some(b => {
      if(b.id === excludeId) return false;
      if(b.status === "cancelled") return false;
      if(b.roomId !== roomId || b.date !== date) return false;
      return (timeStart < b.timeEnd && timeEnd > b.timeStart);
    });
  },

  hasPendingBooking(userId, excludeId = null){
    const bookings = this.getBookings();
    return bookings.some(b => b.userId === userId && b.status === "pending" && b.id !== excludeId);
  },

  getRoomById(id){ return this.getRooms().find(r => r.id === id); },
  getUserById(id){ return this.getUsers().find(u => u.id === id); },
  getTeachers(){ return this.getUsers().filter(u => u.role === "teacher"); }
};

(async () => { await DB.init(); })();

</script>
<script>
/* =========================================================
   ระบบจองห้องประชุม โรงเรียนสกลราชวิทยานุกูล
   app.js - Application logic & Table Pagination / PDF Export
   ========================================================= */

let currentUser = null;
let currentPage = 'dashboard';
let chartMonthly, chartStatus, chartRoom, chartDepartment;

const STATUS_LABEL = { pending: 'รออนุมัติ', approved: 'อนุมัติ', cancelled: 'ยกเลิก' };
const STATUS_CLASS = { pending: 'badge-pending', approved: 'badge-approved', cancelled: 'badge-cancelled' };
const STATUS_ICON  = { pending: 'bi-hourglass-split', approved: 'bi-check-circle-fill', cancelled: 'bi-x-circle-fill' };

// โครงสร้างตัวแปรเพื่อควบคุมระบบแบ่งหน้าตาราง (Pagination States)
const PaginationState = {
  dashboard: { currentPage: 1, itemsPerPage: 5 },
  mybookings: { currentPage: 1, itemsPerPage: 5 },
  approval: { currentPage: 1, itemsPerPage: 5 },
  reports: { currentPage: 1, itemsPerPage: 10 }
};

/* ===================== INIT ===================== */
document.addEventListener('DOMContentLoaded', () => {
  const session = DB.getSession();
  if(session){
    session.fullname = session.fullname || session.name || '';
    currentUser = session;
    showApp();
  } else {
    showLogin();
  }
  bindLogin();
  bindGlobalSidebarDismiss();
  bindGlobalErrorHandlers();
  initAutoLogout();
});

function showLogin(){
  document.getElementById('loginScreen').classList.remove('d-none');
  document.getElementById('appShell').classList.add('d-none');
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.remove('show');
}

function showApp(){
  document.getElementById('loginScreen').classList.add('d-none');
  document.getElementById('appShell').classList.remove('d-none');
  setupSidebar();
  setupTopbar();
  navigateTo('calendar');
}

function bindGlobalSidebarDismiss() {
  // ปิดแถบเมนูข้างอัตโนมัติเมื่อกดพื้นที่ภายนอกบนมือถือ
  document.addEventListener('click', (e) => {
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('btnToggleSidebar');
    if (sidebar && sidebar.classList.contains('show')) {
      if (!sidebar.contains(e.target) && (!toggleBtn || !toggleBtn.contains(e.target))) {
        sidebar.classList.remove('show');
      }
    }
  });
}

function bindGlobalErrorHandlers() {
  // ดักจับ Error ที่หลุดรอดจาก try-catch เพื่อป้องกันหน้าจอค้าง (Invisible Backdrop)
  window.addEventListener('unhandledrejection', (e) => {
    console.error("Unhandled Rejection:", e.reason);
    if (Swal.isVisible() && Swal.isLoading()) {
      Swal.close();
      Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดของระบบ', text: 'ระบบทำงานผิดพลาดและได้เคลียร์หน้าจอแล้ว กรุณาลองใหม่อีกครั้ง' });
    }
  });
  window.addEventListener('error', (e) => {
    console.error("Global Error:", e.error);
    if (Swal.isVisible() && Swal.isLoading()) {
      Swal.close();
      Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดของระบบ', text: 'ระบบทำงานผิดพลาดและได้เคลียร์หน้าจอแล้ว กรุณาลองใหม่อีกครั้ง' });
    }
  });
}

/* ===================== AUTO LOGOUT ===================== */
let idleTimer;
const IDLE_TIMEOUT_MS = 10 * 60 * 1000; // 10 minutes

function resetIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  if (!currentUser) return; // Only track idle time if logged in
  idleTimer = setTimeout(() => {
    // Session expired due to inactivity, silent logout
    DB.clearSession();
    currentUser = null;
    if (idleTimer) clearTimeout(idleTimer);
    
    // Check if Swal is currently open (like a form) and close it
    if (Swal.isVisible()) {
      Swal.close();
    }
    
    showLogin();
    
    // Optionally notify them after they are on the login screen
    Swal.fire({
      icon: 'info',
      title: 'หมดเวลาเซสชัน',
      text: 'ระบบนำคุณออกอัตโนมัติเนื่องจากไม่มีการใช้งานเกิน 10 นาที เพื่อความปลอดภัย',
      timer: 3000,
      showConfirmButton: false
    });
  }, IDLE_TIMEOUT_MS);
}

function initAutoLogout() {
  // รีเซ็ตตัวจับเวลาเมื่อมีการขยับเมาส์ พิมพ์ข้อความ แตะหน้าจอ หรือเลื่อนจอ
  ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(evt => {
    document.addEventListener(evt, resetIdleTimer, { passive: true });
  });
  resetIdleTimer();
}

/* ===================== LOGIN / LOGOUT ===================== */
function bindLogin(){
  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const u = document.getElementById('loginUsername').value.trim();
    const p = document.getElementById('loginPassword').value;
    attemptLogin(u, p);
  });

  document.querySelectorAll('.btn-demo').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('loginUsername').value = btn.dataset.user;
      document.getElementById('loginPassword').value = btn.dataset.pass;
    });
  });
}

function showLoginError(msg) {
  const errDiv = document.getElementById('loginError');
  const errText = document.getElementById('loginErrorText');
  if (errDiv && errText) {
    errText.textContent = msg;
    errDiv.classList.remove('d-none');
  }
}

function hideLoginError() {
  const errDiv = document.getElementById('loginError');
  if (errDiv) errDiv.classList.add('d-none');
}

async function attemptLogin(username, password){
  hideLoginError();
  // แสดง spinner บนปุ่ม
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('loginBtnText');
  const spinner = document.getElementById('loginBtnSpinner');
  if (btn) btn.disabled = true;
  if (btnText) btnText.textContent = 'กำลังเข้าสู่ระบบ...';
  if (spinner) spinner.classList.remove('d-none');

  try {
    const user = await DB.login(username, password);
    if (user) {
      // Normalize: GAS returns 'name', older code uses 'fullname'
      user.fullname = user.fullname || user.name || '';
      currentUser = user;
      resetIdleTimer(); // <-- Start auto logout timer upon successful login
      Swal.fire({
        icon: 'success',
        title: 'เข้าสู่ระบบสำเร็จ',
        text: `ยินดีต้อนรับ ${user.name || user.fullname}`,
        timer: 1200,
        showConfirmButton: false
      }).then(() => showApp());
    } else {
      showLoginError('ชื่อผู้ใช้งานหรือเบอร์โทรศัพท์ไม่ถูกต้อง');
    }
  } catch(err) {
    showLoginError(err.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
  } finally {
    if (btn) btn.disabled = false;
    if (btnText) btnText.textContent = 'เข้าสู่ระบบ';
    if (spinner) spinner.classList.add('d-none');
  }
}

function logout(){
  Swal.fire({
    title: 'ออกจากระบบ?',
    text: 'คุณต้องการออกจากระบบใช่หรือไม่',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'ออกจากระบบ',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#c1493e'
  }).then(async result => {
    if(result.isConfirmed){
      Swal.fire({
        title: 'กำลังออกจากระบบ...',
        timer: 800,
        showConfirmButton: false,
        didOpen: () => Swal.showLoading()
      }).then(() => {
        DB.clearSession();
        currentUser = null;
        if (idleTimer) clearTimeout(idleTimer);
        showLogin();
      });
    }
  });
}

/* ===================== ROUTER ===================== */
function navigateTo(page){
  if(!currentUser) return;
  currentPage = page;
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || '';

  document.querySelectorAll('.nav-link-item').forEach(a => {
    a.classList.toggle('active', a.dataset.page === page);
  });

  const content = document.getElementById('content');
  const tplId = 'tpl-' + page;
  const tpl = document.getElementById(tplId);
  if(!tpl){ content.innerHTML = '<p>ไม่พบหน้านี้</p>'; return; }

  content.innerHTML = '';
  content.appendChild(tpl.content.cloneNode(true));

  // คืนค่าหน้าตารางเริ่มต้นกลับเป็นหน้าแรกเสมอเมื่อเปลี่ยนเมนู
  if (PaginationState[page]) {
    PaginationState[page].currentPage = 1;

  document.querySelectorAll('.admin-only').forEach(el => {

  document.querySelectorAll('.admin-only-block').forEach(el => {
    el.classList.toggle('d-none', currentUser.role !== 'admin');
  });

  switch(page){
    case 'calendar': renderCalendar(); break;
    case 'dashboard': renderDashboard(); break;
    case 'booking': renderBookingPage(); break;
    case 'mybookings': renderMyBookings(); break;
    case 'approval': renderApproval(); break;
    case 'rooms': renderRooms(); break;
    case 'users': renderUsers(); break;
    case 'reports': renderReports(); break;
  }
}

/* ===================== HELPERS ===================== */
function fmtDate(dateVal){
  if(!dateVal) return '-';
  let dateStr = '';
  // Handle GAS Date objects coming as ISO strings like "2024-07-02T00:00:00.000Z"
  if(typeof dateVal === 'string' && dateVal.includes('T')){
    // Extract date part only (YYYY-MM-DD)
    dateStr = dateVal.split('T')[0];
  } else if(dateVal instanceof Date){
    // Date object from GAS
    const offset = dateVal.getTimezoneOffset() * 60000;
    dateStr = new Date(dateVal - offset).toISOString().split('T')[0];
  } else {
    // Plain string "YYYY-MM-DD" from localStorage
    dateStr = String(dateVal);
  }
  // dateStr is now "YYYY-MM-DD"
  const parts = dateStr.split('-');
  if(parts.length < 3) return dateStr;
  const [y, m, d] = parts.map(Number);
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  if(!months[m-1]) return dateStr;
  return `${d} ${months[m-1]} ${y+543}`;
}

function fmtDateRaw(dateVal){
  // Returns YYYY-MM-DD string for <input type="date">
  if(!dateVal) return '';
  if(typeof dateVal === 'string' && dateVal.includes('T')) return dateVal.split('T')[0];
  if(dateVal instanceof Date){
    const offset = dateVal.getTimezoneOffset() * 60000;
    return new Date(dateVal - offset).toISOString().split('T')[0];
  }
  return String(dateVal).split('T')[0];
}

function fmtTime(b){
  // Google Sheets returns time as Date object "1899-12-30T04:17:56.000Z"
  // We need to extract HH:MM from it
  const extractTime = (t) => {
    if(!t) return '--:--';
    if(typeof t === 'string' && t.includes('T')){
      // ISO datetime string: extract UTC hours/minutes as local Thai time
      const d = new Date(t);
      // Add 7 hours for Thai timezone (ICT = UTC+7)
      const thaiMs = d.getTime() + (7 * 60 * 60 * 1000);
      const thaiDate = new Date(thaiMs);
      const hh = String(thaiDate.getUTCHours()).padStart(2,'0');
      const mm = String(thaiDate.getUTCMinutes()).padStart(2,'0');
      return `${hh}:${mm}`;
    }
    if(t instanceof Date){
      const thaiMs = t.getTime() + (7 * 60 * 60 * 1000);
      const thaiDate = new Date(thaiMs);
      const hh = String(thaiDate.getUTCHours()).padStart(2,'0');
      const mm = String(thaiDate.getUTCMinutes()).padStart(2,'0');
      return `${hh}:${mm}`;
    }
    return String(t); // plain "HH:MM" string from localStorage
  };
  return `${extractTime(b.timeStart)} - ${extractTime(b.timeEnd)}`;
}

function roomName(id){
  const r = DB.getRoomById(id);
  return r ? r.name : '-';
}

function statusBadge(status){
  const st = (status && STATUS_CLASS[status]) ? status : 'pending';
  return `<span class="badge-status ${STATUS_CLASS[st]}"><i class="bi ${STATUS_ICON[st]}"></i> ${STATUS_LABEL[st]}</span>`;
}

function equipText(equip){
  if(!equip || equip.length === 0) return '-';
  return equip.join(', ');
}

// ฟังก์ชันศูนย์กลางจัดเรนเดอร์แถบระบบเปลี่ยนหน้าตาราง (Reusable Pagination Controller)
function renderPaginationControls(containerId, stateKey, totalItems, onPageChange) {
  const container = document.getElementById(containerId);
  if(!container) return;

  const state = PaginationState[stateKey];
  const totalPages = Math.ceil(totalItems / state.itemsPerPage);

  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  let html = `
    <nav aria-label="Page navigation" class="mt-3 no-print">
      <ul class="pagination pagination-sm justify-content-end mb-0">
        <li class="page-item ${state.currentPage === 1 ? 'disabled' : ''}">
          <a class="page-link" href="#" data-page="${state.currentPage - 1}" style="color: var(--navy); border-color: var(--line);">ก่อนหน้า</a>
        </li>
  `;

  for (let i = 1; i <= totalPages; i++) {
    html += `
      <li class="page-item ${state.currentPage === i ? 'active' : ''}">
        <a class="page-link" href="#" data-page="${i}" style="${state.currentPage === i ? 'background-color: var(--navy); border-color: var(--navy); color: #fff;' : 'color: var(--navy); border-color: var(--line);'}">${i}</a>
      </li>
    `;
  }

  html += `
        <li class="page-item ${state.currentPage === totalPages ? 'disabled' : ''}">
          <a class="page-link" href="#" data-page="${state.currentPage + 1}" style="color: var(--navy); border-color: var(--line);">ถัดไป</a>
        </li>
      </ul>
    </nav>
  `;

  container.innerHTML = html;

  container.querySelectorAll('.page-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const targetPage = parseInt(link.dataset.page);
      if (targetPage >= 1 && targetPage <= totalPages) {
        state.currentPage = targetPage;
        onPageChange();
      }
    });
  });
}

/* ---- Phone validation: 0XX-XXX-XXXX ---- */
const PHONE_REGEX = /^0\d{2}-\d{3}-\d{4}$/;

function formatPhoneInput(value){
  const digits = value.replace(/\D/g, '').slice(0, 10);
  if(digits.length <= 3) return digits;
  if(digits.length <= 6) return `${digits.slice(0,3)}-${digits.slice(3)}`;
  return `${digits.slice(0,3)}-${digits.slice(3,6)}-${digits.slice(6,10)}`;
}

function isValidPhone(value){
  return PHONE_REGEX.test(value);
}

function bindPhoneValidation(inputEl){
  inputEl.addEventListener('input', () => {
    const cursorAtEnd = inputEl.selectionStart === inputEl.value.length;
    inputEl.value = formatPhoneInput(inputEl.value);
    if(cursorAtEnd) inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);
    updatePhoneValidationUI(inputEl);
  });
  inputEl.addEventListener('blur', () => updatePhoneValidationUI(inputEl, true));
}

function updatePhoneValidationUI(inputEl, force){
  const val = inputEl.value;
  if(val === ''){
    inputEl.classList.remove('is-invalid-phone', 'is-valid-phone');
    return;
  }
  if(isValidPhone(val)){
    inputEl.classList.remove('is-invalid-phone');
    inputEl.classList.add('is-valid-phone');
  } else {
    inputEl.classList.remove('is-valid-phone');
    if(force || val.length >= 12) inputEl.classList.add('is-invalid-phone');
  }
}

function renderDashboard(){
  const all = DB.getBookings();

  // --- populate year dropdown ---
  const yearSel = document.getElementById('dashFilterYear');
  const existingYears = new Set();
  all.forEach(b => { if(b.date) existingYears.add(b.date.slice(0,4)); });
  const sortedYears = Array.from(existingYears).sort().reverse();
  yearSel.innerHTML = '<option value="">ทุกปี</option>' +
    sortedYears.map(y => `<option value="${y}">${parseInt(y)+543}</option>`).join('');

  // --- populate department dropdown ---
  const deptSel = document.getElementById('dashFilterDept');
  const depts = new Set();
  all.filter(b => !b.isExternal && b.department).forEach(b => depts.add(b.department));
  deptSel.innerHTML = '<option value="">ทุกกลุ่มสาระ/ฝ่ายงาน</option>' +
    '<option value="__external__">บุคคลภายนอก</option>' +
    Array.from(depts).sort().map(d => `<option value="${d}">${d}</option>`).join('');

  function getFiltered() {
    const fYear  = document.getElementById('dashFilterYear').value;
    const fMonth = document.getElementById('dashFilterMonth').value;
    const fDept  = document.getElementById('dashFilterDept').value;
    return all.filter(b => {
      if(fYear  && !b.date.startsWith(fYear)) return false;
      if(fMonth && b.date.slice(5,7) !== fMonth) return false;
      if(fDept === '__external__' && !b.isExternal) return false;
      if(fDept && fDept !== '__external__' && b.department !== fDept) return false;
      return true;
    });
  }

  function refreshDashboard() {
    const filtered = getFiltered();
    // stat cards
    document.getElementById('statTotal').textContent     = filtered.length;
    document.getElementById('statPending').textContent   = filtered.filter(b=>b.status==='pending').length;
    document.getElementById('statApproved').textContent  = filtered.filter(b=>b.status==='approved').length;
    document.getElementById('statCancelled').textContent = filtered.filter(b=>b.status==='cancelled').length;
    // charts
    try{ renderDashboardCharts(filtered, filtered); }catch(e){ console.error(e); }
    // table
    PaginationState.dashboard.currentPage = 1;
    try{ renderDashboardTable(filtered); }catch(e){ console.error(e); }
  }

  // bind filter changes
  ['dashFilterYear','dashFilterMonth','dashFilterDept'].forEach(id => {
    document.getElementById(id).addEventListener('change', refreshDashboard);
  });
  document.getElementById('dashFilterReset').addEventListener('click', () => {
    document.getElementById('dashFilterYear').value  = '';
    document.getElementById('dashFilterMonth').value = '';
    document.getElementById('dashFilterDept').value  = '';
    refreshDashboard();
  });

  // search & status filter in table
  document.getElementById('dashSearch').addEventListener('input', () => {
    PaginationState.dashboard.currentPage = 1;
    renderDashboardTable(getFiltered());
  });
  document.getElementById('dashStatusFilter').addEventListener('change', () => {
    PaginationState.dashboard.currentPage = 1;
    renderDashboardTable(getFiltered());
  });

  // initial render
  refreshDashboard();
}

function renderDashboardTable(mine){
  const search = (document.getElementById('dashSearch').value || '').toLowerCase();
  const statusFilter = document.getElementById('dashStatusFilter').value;

  let rows = mine.filter(b => {
    const text = `${b.bookerName} ${b.topic} ${b.department || ''} ${roomName(b.roomId)}`.toLowerCase();
    const matchSearch = text.includes(search);
    const matchStatus = !statusFilter || b.status === statusFilter;
    return matchSearch && matchStatus;
  });

  rows = rows.sort((a,b) => new Date(b.date) - new Date(a.date));

  // แยกระบบตัดหน้ารายการ (Pagination Split)
  const totalItems = rows.length;
  const state = PaginationState.dashboard;
  const startIndex = (state.currentPage - 1) * state.itemsPerPage;
  const paginatedRows = rows.slice(startIndex, startIndex + state.itemsPerPage);

  const tbody = document.querySelector('#dashTable tbody');
  if(rows.length === 0){
    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">ไม่พบข้อมูล</td></tr>`;
    document.getElementById('dashPagination').innerHTML = '';
    return;
  }
  tbody.innerHTML = paginatedRows.map(b => `
    <tr>
      <td>${fmtDate(b.date)}</td>
      <td>${fmtTime(b)}</td>
      <td>${roomName(b.roomId)}</td>
      <td>
        <strong>${b.topic}</strong>
        ${b.department ? `<br><span class="text-muted" style="font-size:11.5px;"><i class="bi bi-tag-fill"></i> ${b.department}</span>` : ''}
      </td>
      <td>${b.bookerName}${b.isExternal ? ' <span class="badge bg-secondary-subtle text-secondary">ภายนอก</span>' : ''}</td>
      <td>${statusBadge(b.status)}</td>
    </tr>
  `).join('');

  renderPaginationControls('dashPagination', 'dashboard', totalItems, () => renderDashboardTable(mine));
}

function updateAvailableHours() {
  const dateVal = document.getElementById('bk_date').value;
  const startSel = document.getElementById('bk_start_hour');
  const endSel   = document.getElementById('bk_end_hour');
  if (!startSel || !endSel) return;

  const nowTH = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
  const todayStr = todayISO(0);
  const isToday = dateVal === todayStr;

  // current selections
  const prevStart = startSel.value;
  const prevEnd   = endSel.value;

  // Build allowed hours
  const minHour = isToday ? nowTH.getHours() + 1 : 0; // next hour from now if today

  // Re-render options
  let startHtml = '';
  let endHtml   = '';
  for (let h = 0; h < 24; h++) {
    const hh = String(h).padStart(2, '0');
    const disabled = isToday && h < minHour ? 'disabled' : '';
    startHtml += `<option value="${hh}" ${disabled}>${hh}</option>`;
    endHtml   += `<option value="${hh}" ${disabled}>${hh}</option>`;
  }
  startSel.innerHTML = startHtml;
  endSel.innerHTML   = endHtml;

  // Restore selection if still valid
  const firstValid = String(minHour).padStart(2, '0');
  startSel.value = (!isToday || prevStart >= firstValid) ? prevStart : firstValid;
  const nextHour = String(minHour + 1).padStart(2, '0');
  endSel.value   = (!isToday || prevEnd > startSel.value) ? prevEnd : (parseInt(startSel.value) + 1 < 24 ? String(parseInt(startSel.value)+1).padStart(2,'0') : startSel.value);

  // Trigger re-check after update
  triggerRoomAvailabilityCheck();
}

function triggerRoomAvailabilityCheck() {
  const date = document.getElementById('bk_date').value;
  const startHour = document.getElementById('bk_start_hour').value;
  const startMin = document.getElementById('bk_start_min').value;
  const endHour = document.getElementById('bk_end_hour').value;
  const endMin = document.getElementById('bk_end_min').value;
  
  const select = document.getElementById('bk_room');
  const editIdInput = document.getElementById('bookingEditId');
  const excludeId = editIdInput && editIdInput.value ? parseInt(editIdInput.value) : null;

  if(!select) return;

  const rooms = DB.getRooms();

  if(date && startHour && startMin && endHour && endMin) {
    const start = `${startHour}:${startMin}`;
    const end = `${endHour}:${endMin}`;

    if(start >= end) {
      select.disabled = true;
      select.innerHTML = '<option value="">-- เวลาเริ่มงานต้องน้อยกว่าเวลาสิ้นสุด --</option>';
      renderRoomCards(rooms, null, null, null, excludeId);
      return;
    }
    
    // ตรวจสอบว่าไม่ใช่เวลาย้อนหลัง
    const nowTH = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
    const selectedDate = new Date(date + 'T' + start + ':00');
    if(date === todayISO(0) && selectedDate < nowTH) {
      select.disabled = true;
      select.innerHTML = '<option value="">-- ไม่สามารถจองเวลาที่ผ่านมาแล้วได้ --</option>';
      renderRoomCards(rooms, null, null, null, excludeId);
      // แสดง warning ที่ตัวเลือกชั่วโมง
      const startHourEl = document.getElementById('bk_start_hour');
      if(startHourEl) { startHourEl.classList.add('is-invalid'); startHourEl.title = 'เวลาที่เลือกผ่านมาแล้ว'; }
      return;
    }
    // ล้าง invalid ถ้าเวลาถูกต้อง
    const startHourEl2 = document.getElementById('bk_start_hour');
    if(startHourEl2) { startHourEl2.classList.remove('is-invalid'); startHourEl2.title = ''; }

    select.disabled = false;
    let optionsHtml = '<option value="">-- เลือกห้องประชุมที่ว่าง --</option>';

    rooms.forEach(r => {
      const isConflicted = DB.hasConflict(r.id, date, start, end, excludeId);
      if (r.status === 'maintenance') {
        optionsHtml += `<option value="${r.id}" disabled>${r.name} (ปิดปรับปรุง)</option>`;
      } else if(isConflicted) {
        optionsHtml += `<option value="${r.id}" disabled>${r.name} (ไม่ว่างในช่วงเวลานี้)</option>`;
      } else {
        optionsHtml += `<option value="${r.id}">${r.name} (ว่าง)</option>`;
      }
    });

    select.innerHTML = optionsHtml;
    renderRoomCards(rooms, date, start, end, excludeId);
  } else {
    select.disabled = true;
    select.innerHTML = '<option value="">-- กรุณาเลือกวันที่ และเวลาเริ่ม-สิ้นสุด ด้านบนเพื่อตรวจสอบห้องว่าง --</option>';
    renderRoomCards(rooms, null, null, null, excludeId);
  }
}

function selectRoomFromCard(roomId, excludeId = null) {
  const select = document.getElementById('bk_room');
  if(!select || select.disabled) return;
  select.value = roomId;

  document.querySelectorAll('.room-card-interactive').forEach(card => {
    card.style.borderColor = '';
    card.style.backgroundColor = '';
    card.style.boxShadow = '';
  });

  const activeCard = document.getElementById(`room-card-${roomId}`);
  if(activeCard) {
    activeCard.style.borderColor = 'var(--gold)';
    activeCard.style.backgroundColor = 'var(--gold-soft)';
    activeCard.style.boxShadow = '0 4px 12px rgba(217,164,64,0.25)';
  }
}

function renderRoomCards(rooms, date = null, start = null, end = null, excludeId = null){
  const container = document.getElementById('roomCardsContainer');
  if(!container) return;

  if(!date || !start || !end) {
    container.innerHTML = rooms.map(r => {
      const isMaintenance = r.status === 'maintenance';
      const maintenanceBadge = isMaintenance
        ? `<span class="badge bg-warning text-dark mb-2"><i class="bi bi-tools"></i> ปิดปรับปรุง</span>`
        : '';
      const cardStyle = isMaintenance
        ? `border-left: 5px solid #999; opacity: 0.6; cursor: not-allowed; background-color: #f5f5f5;`
        : `border-left: 5px solid ${r.color || 'var(--gold)'};`;
      const statusInfo = isMaintenance
        ? `<div class="mt-2 text-muted text-center py-2 rounded" style="font-size:11.5px; background: #f0ede6;">
              <i class="bi bi-cone-striped"></i> ห้องนี้ไม่สามารถจองได้ในขณะนี้
           </div>`
        : `<div class="mt-2 text-muted text-center py-2 rounded" style="font-size:11.5px; background: #f0ede6;">
              <i class="bi bi-clock"></i> ระบุวัน-เวลาก่อนเพื่อเช็คห้องว่าง
           </div>`;
      return `
        <div class="col-md-6 col-lg-3">
          <div class="room-card" style="${cardStyle}">
            <div class="room-card-icon" style="background-color: ${r.color}22; color: ${r.color};"><i class="bi bi-door-open-fill"></i></div>
            ${maintenanceBadge}
            <h6>${r.name}</h6>
            <div class="meta"><i class="bi bi-building"></i> ${r.building ? r.building + " • " + r.floor : (r.floor || "ไม่ระบุอาคาร")}</div>
            <div class="meta"><i class="bi bi-people"></i> ความจุ ${r.capacity} คน</div>
            ${statusInfo}
          </div>
        </div>
      `;
    }).join('');
    return;
  }

  container.innerHTML = rooms.map(r => {
    const isMaintenance = r.status === 'maintenance';
    const isConflicted = !isMaintenance && DB.hasConflict(r.id, date, start, end, excludeId);
    const selectedRoomId = document.getElementById('bk_room').value;
    const isSelected = selectedRoomId == r.id;

    let badgeHtml = '';
    let cardStyle = `border-left: 5px solid ${r.color || 'var(--gold)'};`;
    let clickAttr = '';
    let extraConflictInfo = '';

    if(isMaintenance) {
      badgeHtml = `<span class="badge bg-warning text-dark mb-2"><i class="bi bi-tools"></i> ปิดปรับปรุง — ไม่สามารถจองได้</span>`;
      cardStyle += `opacity: 0.55; cursor: not-allowed; background-color: #f5f5f5; border-left-color: #aaa !important;`;
    } else if(isConflicted) {
      const activeBooking = DB.getBookings().find(b =>
        b.roomId === r.id &&
        b.date === date &&
        b.status !== 'cancelled' &&
        (start < b.timeEnd && end > b.timeStart) &&
        b.id !== excludeId
      );
      badgeHtml = `<span class="badge bg-danger-subtle text-danger mb-2"><i class="bi bi-x-circle-fill"></i> ไม่ว่างในช่วงเวลานี้</span>`;
      cardStyle += `opacity: 0.65; cursor: not-allowed; background-color: #fafafa;`;

      if(activeBooking) {
        extraConflictInfo = `
          <div class="mt-2 p-2 bg-light rounded text-start" style="font-size:11px; border-left: 2px solid var(--red);">
            <strong>ผู้จอง:</strong> ${activeBooking.bookerName}<br>
            <strong>ฝ่าย/กลุ่มสาระ:</strong> ${activeBooking.department || '-'}<br>
            <strong>ช่วงเวลา:</strong> ${activeBooking.timeStart} - ${activeBooking.timeEnd}<br>
            <strong>หัวข้อ:</strong> ${activeBooking.topic}
          </div>
        `;
      }
    } else {
      badgeHtml = `<span class="badge bg-success-subtle text-success mb-2"><i class="bi bi-check-circle-fill"></i> ว่าง (คลิกเลือกห้องนี้)</span>`;
      cardStyle += `cursor: pointer;`;
      if(isSelected) {
        cardStyle += `border-color: var(--gold) !important; background-color: var(--gold-soft) !important; box-shadow: 0 4px 12px rgba(217,164,64,0.25);`;
      }
      clickAttr = `onclick="selectRoomFromCard(${r.id}, ${excludeId})"`;
    }

    return `
      <div class="col-md-6 col-lg-3">
        <div class="room-card room-card-interactive" id="room-card-${r.id}" style="${cardStyle}" ${clickAttr}>
          <div class="room-card-icon" style="background-color: ${r.color}22; color: ${r.color};">
            <i class="bi bi-door-open-fill"></i>
          </div>
          ${badgeHtml}
          <h6>${r.name}</h6>
          <div class="meta"><i class="bi bi-building"></i> ${r.building ? r.building + " • " + r.floor : (r.floor || "ไม่ระบุอาคาร")}</div>
          <div class="meta"><i class="bi bi-people"></i> ความจุ ${r.capacity} คน</div>
          ${extraConflictInfo}
        </div>
      </div>
    `;
  }).join('');
}

    await submitBooking();

  document.getElementById('bk_cancel_edit').addEventListener('click', () => {
    resetBookingForm();
  });
}

async function submitBooking(){
  const editId = document.getElementById('bookingEditId').value;
  const roomId = parseInt(document.getElementById('bk_room').value);
  const date = document.getElementById('bk_date').value;
  
  const startHour = document.getElementById('bk_start_hour').value;
  const startMin = document.getElementById('bk_start_min').value;
  const endHour = document.getElementById('bk_end_hour').value;
  const endMin = document.getElementById('bk_end_min').value;

  const timeStart = `${startHour}:${startMin}`;
  const timeEnd = `${endHour}:${endMin}`;

  const topic = document.getElementById('bk_topic').value.trim();
  const department = document.getElementById('bk_department').value.trim();
  const phoneField = document.getElementById('bk_phone');
  const phone = phoneField.value.trim();
  let bookerName = document.getElementById('bk_name').value.trim();

  if(!roomId) {
    Swal.fire('กรุณาเลือกห้องประชุม', 'คุณต้องเลือกห้องประชุมที่ว่างในช่วงเวลาที่กำหนด', 'warning');
    return;
  }

  const selectedRoom = DB.getRoomById(roomId);
  if(selectedRoom && selectedRoom.status === 'maintenance'){
    Swal.fire('ไม่สามารถจองได้', 'ห้องประชุมนี้อยู่ในสถานะปิดปรับปรุง', 'error');
    return;
  }

  if(!isValidPhone(phone)){
    updatePhoneValidationUI(phoneField, true);
    Swal.fire({
      icon: 'warning',
      title: 'รูปแบบเบอร์โทรไม่ถูกต้อง',
      text: 'กรุณากรอกเบอร์โทรศัพท์ในรูปแบบ 0XX-XXX-XXXX เช่น 081-234-5678'
    });
    phoneField.focus();
    return;
  }

  const excludeId = editId ? parseInt(editId) : null;
  const existing = excludeId ? DB.getBookings().find(b => b.id === excludeId) : null;

  if(date < todayISO(0)){
    if(!existing || existing.date !== date) {
      Swal.fire('ไม่สามารถจองได้', 'ไม่สามารถจองห้องประชุมย้อนหลังวันที่ปัจจุบันได้', 'warning');
      return;
    }
  }

  if(timeStart >= timeEnd){
    Swal.fire('เวลาไม่ถูกต้อง', 'เวลาเริ่มต้องน้อยกว่าเวลาสิ้นสุด', 'warning');
    return;
  }

  if(!department) {
    Swal.fire('กรุณาระบุหน่วยงาน/สังกัด', 'โปรดพิมพ์ชื่อหน่วยงาน หรือเลือกกลุ่มสาระสังกัด', 'warning');
    return;
  }

  const equipRaw = document.getElementById('bk_equipment').value.trim();
  const equipment = equipRaw ? equipRaw.split(',').map(s => s.trim()).filter(s => s) : [];

  if(DB.hasConflict(roomId, date, timeStart, timeEnd, excludeId)){
    Swal.fire({
      icon: 'error',
      title: 'ห้องประชุมถูกจองแล้ว',
      text: 'ห้องประชุมนี้มีการจองในวันและเวลาดังกล่าวแล้ว กรุณาเลือกเวลาหรือห้องอื่น',
      icon: 'error'
    });
    return;
  }

  if(currentUser.role === 'teacher' && !editId && DB.hasPendingBooking(currentUser.id)){
    Swal.fire('ไม่สามารถจองได้', 'คุณมีรายการรออนุมัติอยู่แล้ว กรุณารอแอดมินอนุมัติก่อน', 'warning');
    return;
  }

  let isExternal = false;
  let userId = currentUser.id;

  if(currentUser.role === 'admin'){
    const bookerType = document.getElementById('bk_booker_type').value;

    if(!editId && !bookerType){
      Swal.fire('กรุณาเลือกข้อมูล', 'กรุณาเลือกประเภทผู้จองก่อนทำรายการ', 'warning');
      return;
    }

    if(bookerType === 'teacher'){
      const teacherId = document.getElementById('bk_teacher_select').value;
      if(!teacherId){
        Swal.fire('กรุณาเลือกข้อมูล', 'กรุณาเลือกชื่อครู/บุคลากร', 'warning');
        return;
      }
      isExternal = false;
      userId = parseInt(teacherId);
      const teacher = DB.getUserById(userId);
      bookerName = teacher ? teacher.fullname : bookerName;
    } else if(bookerType === 'external'){
      isExternal = true;
      userId = null;
      if(!bookerName){
        Swal.fire('กรุณากรอกข้อมูล', 'กรุณาระบุชื่อผู้จอง', 'warning');
        return;
      }
    } else if(editId){
      const existing = DB.getBookings().find(b => b.id === parseInt(editId));
      if(existing){
        isExternal = existing.isExternal;
        userId = existing.userId;
        if(!bookerName) bookerName = existing.bookerName;
      }
    }
  }

  const bookingData = {
    userId, isExternal, bookerName, phone, department, roomId, topic, date, timeStart, timeEnd, equipment
  };

  Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
  try {
    if(editId){
      await DB.updateBooking(parseInt(editId), bookingData);
      await Swal.fire({ icon: 'success', title: 'บันทึกการแก้ไขสำเร็จ', timer: 1300, showConfirmButton: false });
      resetBookingForm(); navigateTo('mybookings');
    } else {
      await DB.addBooking(bookingData);
      await Swal.fire({ icon: 'success', title: 'ส่งคำขอจองสำเร็จ', text: 'รายการของคุณอยู่ในสถานะ "รออนุมัติ"', timer: 1600, showConfirmButton: false });
      resetBookingForm(); navigateTo('mybookings');
    }
    updatePendingBadge();
  } catch(err) {
    Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: err.message || 'กรุณาลองใหม่อีกครั้ง' });
  }
}

/* =========================================================
   MY BOOKINGS / ALL BOOKINGS PAGE
   ========================================================= */
function renderMyBookings(){
  document.getElementById('myBookingsTitle').innerHTML = currentUser.role === 'admin'
    ? '<i class="bi bi-card-checklist"></i> รายการจองทั้งหมด'
    : '<i class="bi bi-card-checklist"></i> รายการจองของฉัน';

  const rooms = DB.getRooms();
  const roomSelect = document.getElementById('mb_room');
  if (roomSelect && roomSelect.options.length <= 1) {
    roomSelect.innerHTML = '<option value="">ทุกห้อง</option>' + rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
  }

  const renderTable = () => {
    const from = document.getElementById('mb_from') ? document.getElementById('mb_from').value : '';
    const to = document.getElementById('mb_to') ? document.getElementById('mb_to').value : '';
    const roomId = document.getElementById('mb_room') ? document.getElementById('mb_room').value : '';
    const statusFilter = document.getElementById('mb_filter_status') ? document.getElementById('mb_filter_status').value : '';
    const search = document.getElementById('mb_search') ? document.getElementById('mb_search').value.toLowerCase().trim() : '';

    let rows = visibleBookings();
    
    rows = rows.filter(b => {
      let ok = true;
      if(from) ok = ok && b.date >= from;
      if(to) ok = ok && b.date <= to;
      if(roomId) ok = ok && b.roomId === parseInt(roomId);
      if(statusFilter) ok = ok && b.status === statusFilter;
      if(search) {
        const booker = (b.bookerName || '').toLowerCase();
        const topic = (b.topic || '').toLowerCase();
        const dept = (b.department || '').toLowerCase();
        ok = ok && (booker.includes(search) || topic.includes(search) || dept.includes(search));
      }
      return ok;
    });

    rows = rows.sort((a,b) => new Date(b.date) - new Date(a.date));

    const tbody = document.querySelector('#mbTable tbody');
    const empty = document.getElementById('mbEmpty');
    const paginationEl = document.getElementById('mbPagination');

    if(rows.length === 0){
      tbody.innerHTML = '';
      empty.classList.remove('d-none');
      if(paginationEl) paginationEl.innerHTML = '';
      return;
    }
    empty.classList.add('d-none');

    // แยกระบบตัดหน้ารายการของหน้าจองของฉัน (My Bookings Pagination Split)
    const totalItems = rows.length;
    const state = PaginationState.mybookings;
    const startIndex = (state.currentPage - 1) * state.itemsPerPage;
    const paginatedRows = rows.slice(startIndex, startIndex + state.itemsPerPage);

    tbody.innerHTML = paginatedRows.map((b, i) => {
      const index = startIndex + i + 1;
      const bRoom = DB.getRoomById(b.roomId);
      const rColor = bRoom ? (bRoom.color || 'var(--gold)') : 'var(--gold)';
      const isPending = b.status === 'pending';
      const isTeacherOwnPending = currentUser.role === 'teacher' && b.userId === currentUser.id && isPending;
      const isAdminPending = currentUser.role === 'admin' && isPending;
      const isAdmin = currentUser.role === 'admin';

      let actions = `<button class="btn-action act-view" title="ดูรายละเอียด" onclick="viewBookingDetail(${b.id})"><i class="bi bi-eye"></i></button>`;
      
      if (isTeacherOwnPending || isAdminPending) {
        actions += `<button class="btn-action act-edit" title="แก้ไข" onclick="editBooking(${b.id})"><i class="bi bi-pencil"></i></button>`;
      }
      if (isTeacherOwnPending || isAdmin) {
        actions += `<button class="btn-action act-cancel" title="ลบการจอง" onclick="deleteBooking(${b.id})"><i class="bi bi-trash"></i></button>`;
      }
      return `
        <tr>
          <td>${index}</td>
          <td>
            <strong>${(b.bookerName === "undefined" || !b.bookerName) ? "ไม่ระบุชื่อ" : b.bookerName}</strong>
            ${b.isExternal ? ' <span class="badge bg-secondary-subtle text-secondary">ภายนอก</span>' : ''}
            <br><span class="text-muted" style="font-size:11.5px;"><i class="bi bi-tag-fill"></i> ${b.department || '-'}</span>
          </td>
          <td>
            <span class="badge" style="background-color: ${rColor}; color: white; font-weight: 500;">
              ${roomName(b.roomId)}
            </span>
          </td>
          <td style="max-width: 250px;" class="text-truncate">${b.topic}</td>
          <td>${fmtDate(b.date)}</td>
          <td>${fmtTime(b)}</td>
          <td>${equipText(b.equipment)}</td>
          <td>${statusBadge(b.status)}</td>
          <td class="text-end text-nowrap">${actions}</td>
        </tr>
      `;
    }).join('');

    renderPaginationControls('mbPagination', 'mybookings', totalItems, renderTable);
  };

  ['mb_from', 'mb_to', 'mb_room', 'mb_filter_status'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('change', () => {
        PaginationState.mybookings.currentPage = 1;
        renderTable();
      });
    }
  });

  const searchEl = document.getElementById('mb_search');
  if (searchEl) {
    searchEl.addEventListener('input', () => {
      PaginationState.mybookings.currentPage = 1;
      renderTable();
    });
  }
  renderTable();
}

function editBooking(id){
  const b = DB.getBookings().find(x => x.id === id);
  if(!b) return;

  // ตรวจสอบสิทธิ์: ผู้ใช้ทั่วไปแก้ไขได้เฉพาะรายการของตัวเองที่สถานะ "รออนุมัติ" เท่านั้น
  if(currentUser.role === 'teacher'){
    if(b.userId !== currentUser.id){
      Swal.fire({ icon: 'error', title: 'ไม่มีสิทธิ์แก้ไข', text: 'คุณสามารถแก้ไขได้เฉพาะรายการจองของตัวเองเท่านั้น' });
      return;
    }
    if(b.status !== 'pending'){
      const statusText = b.status === 'approved' ? 'อนุมัติแล้ว' : 'ยกเลิกแล้ว';
      Swal.fire({ icon: 'warning', title: 'ไม่สามารถแก้ไขได้', text: `ไม่สามารถแก้ไขรายการที่ "${statusText}" ได้ สามารถแก้ไขได้เฉพาะรายการที่สถานะ "รออนุมัติ" เท่านั้น` });
      return;
    }
  }

  navigateTo('booking');

  setTimeout(() => {
    // ปลดล็อกฟอร์มทั้งหมดก่อนในกรณีแก้ไข (อาจถูกล็อกจากระบบ hasPendingBooking)
    document.getElementById('bookingLockAlert').classList.add('d-none');
    document.getElementById('bookingForm').querySelectorAll('input,select,textarea,button').forEach(el => {
      el.disabled = false;
    });

    document.getElementById('bookingEditId').value = b.id;

    // ลบ min ของวันที่ เพื่อให้แก้ไขย้อนหลังได้
    document.getElementById('bk_date').removeAttribute('min');
    document.getElementById('bk_date').value = b.date;

    if(b.timeStart) {
      const startParts = b.timeStart.split(':');
      if(startParts.length >= 2) {
        document.getElementById('bk_start_hour').value = startParts[0];
        document.getElementById('bk_start_min').value = startParts[1];
      }
    }
    if(b.timeEnd) {
      const endParts = b.timeEnd.split(':');
      if(endParts.length >= 2) {
        document.getElementById('bk_end_hour').value = endParts[0];
        document.getElementById('bk_end_min').value = endParts[1];
      }
    }
    
    // อัปเดตชั่วโมงที่ให้เลือกหลังจากตั้งค่า date และ time ปัจจุบัน
    updateAvailableHours();

    const forceReadonly = !b.isExternal && (currentUser.role === 'teacher' || !!b.userId);
    renderDepartmentField(b.isExternal, b.department || '', forceReadonly);

    triggerRoomAvailabilityCheck();

    document.getElementById('bk_room').value = b.roomId;
    selectRoomFromCard(b.roomId, b.id);

    document.getElementById('bk_topic').value = b.topic;

    const phoneField = document.getElementById('bk_phone');
    const tp = String(b.phone || '');
    const normalized = tp && !tp.startsWith('0') ? '0' + tp : tp;
    phoneField.value = formatPhoneInput(normalized);
    updatePhoneValidationUI(phoneField);

    document.getElementById('bk_equipment').value = (b.equipment || []).join(', ');

    if (currentUser.role === 'admin') {
      const bookerTypeSelect = document.getElementById('bk_booker_type');
      if (bookerTypeSelect) {
        if (b.isExternal) {
          bookerTypeSelect.value = 'external';
          document.getElementById('bk_teacher_select_wrap').classList.add('d-none');
        } else {
          bookerTypeSelect.value = 'teacher';
          document.getElementById('bk_teacher_select_wrap').classList.remove('d-none');
          document.getElementById('bk_teacher_select').value = b.userId || '';
        }
      }
      document.getElementById('bk_name').value = b.bookerName;
      document.getElementById('bk_name').readOnly = b.isExternal ? false : true;
      document.getElementById('bk_name').classList.toggle('bg-light', !b.isExternal);
      
      const pf = document.getElementById('bk_phone');
      pf.readOnly = b.isExternal ? false : true;
      pf.classList.toggle('bg-light', !b.isExternal);
    } else {
      // ผู้ใช้ทั่วไป: ชื่อและฝ่ายล็อก แต่วันที่/เวลา/ห้อง/หัวข้อ/อุปกรณ์แก้ไขได้
      document.getElementById('bk_name').value = b.bookerName;
      document.getElementById('bk_name').readOnly = true;
      document.getElementById('bk_name').classList.add('bg-light');
    }

    document.getElementById('bk_submit_btn').innerHTML = '<i class="bi bi-save"></i> บันทึกการแก้ไข';
    document.getElementById('bk_submit_btn').disabled = false;
    document.getElementById('bk_cancel_edit').classList.remove('d-none');

    Swal.fire({ icon: 'info', title: 'แก้ไขรายละเอียด', text: 'คุณกำลังแก้ไขข้อมูลของรายการจองนี้ สามารถเปลี่ยนวันที่ เวลา ห้อง หัวข้อ และอุปกรณ์ได้', timer: 2000, showConfirmButton: false });
  }, 100);
}

function deleteBooking(id){
  const userRole = currentUser ? currentUser.role : 'teacher';
  const warningText = userRole === 'admin' 
    ? 'คุณต้องการลบรายการจองนี้ออกจากระบบอย่างถาวรใช่หรือไม่'
    : 'คุณต้องการลบรายการจองนี้ใช่หรือไม่ (สามารถลบได้เฉพาะรายการที่สถานะรออนุมัติเท่านั้น)';

  Swal.fire({
    title: 'ลบรายการจอง?',
    text: warningText,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'ลบรายการ',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#c1493e'
  }).then(async result => {
    if(result.isConfirmed){
      Swal.fire({ title: 'กำลังลบข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        await DB.deleteBooking(id);
        await Swal.fire({ icon: 'success', title: 'ลบรายการสำเร็จ', timer: 1200, showConfirmButton: false });
        updatePendingBadge();
        if (currentPage === 'mybookings') renderMyBookings();
        else if (currentPage === 'approval') renderApproval();
        else if (currentPage === 'calendar') renderCalendar();
      } catch(err) {
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: err.message });
      }
    }
  });
}

/* =========================================================
   APPROVAL PAGE (ADMIN)
   ========================================================= */
function renderApproval(){
  const renderTable = () => {
    const search = (document.getElementById('ap_search').value || '').toLowerCase();
    const statusFilter = document.getElementById('ap_filter_status').value;
    const dateFilter = document.getElementById('ap_filter_date').value;

    let rows = DB.getBookings().filter(b => {
      const text = `${b.bookerName} ${b.topic} ${b.department || ''} ${roomName(b.roomId)} ${b.phone}`.toLowerCase();
      const matchSearch = text.includes(search);
      const matchStatus = !statusFilter || b.status === statusFilter;
      const matchDate = !dateFilter || b.date === dateFilter;
      return matchSearch && matchStatus && matchDate;
    });

    rows = rows.sort((a,b) => new Date(a.date) - new Date(b.date));

    const tbody = document.querySelector('#apTable tbody');
    const paginationEl = document.getElementById('apPagination');
    if(rows.length === 0){
      tbody.innerHTML = `<tr><td colspan="10" class="text-center text-muted py-4">ไม่พบข้อมูล</td></tr>`;
      if(paginationEl) paginationEl.innerHTML = '';
      return;
    }

    // แยกระบบจัดหน้าแสดงผลของตารางตรวจสอบอนุมัติ (Approval Pagination Split)
    const totalItems = rows.length;
    const state = PaginationState.approval;
    const startIndex = (state.currentPage - 1) * state.itemsPerPage;
    const paginatedRows = rows.slice(startIndex, startIndex + state.itemsPerPage);

    tbody.innerHTML = paginatedRows.map((b, i) => {
      const index = startIndex + i + 1;
      const bRoom = DB.getRoomById(b.roomId);
      const rColor = bRoom ? (bRoom.color || 'var(--gold)') : 'var(--gold)';
      
      let actions = `<button class="btn-action act-view" title="ดูรายละเอียด" onclick="viewBookingDetail(${b.id})"><i class="bi bi-eye"></i></button>`;
      
      if(b.status === 'pending'){
        actions += `<button class="btn-action act-approve" title="อนุมัติ" onclick="approveBooking(${b.id})"><i class="bi bi-check-lg"></i></button>`;
        actions += `<button class="btn-action act-cancel" title="ปฏิเสธ/ยกเลิก" onclick="rejectBooking(${b.id})"><i class="bi bi-x-lg"></i></button>`;
      } else if(b.status === 'approved'){
        actions += `<button class="btn-action act-cancel" title="ยกเลิกการอนุมัติ" onclick="rejectBooking(${b.id})"><i class="bi bi-x-lg"></i></button>`;
      }

      actions += `<button class="btn-action act-cancel" title="ลบรายการจอง" onclick="deleteBooking(${b.id})"><i class="bi bi-trash"></i></button>`;

      return `
        <tr>
          <td>${index}</td>
          <td>
            <strong>${(b.bookerName === "undefined" || !b.bookerName) ? "ไม่ระบุชื่อ" : b.bookerName}</strong>
            ${b.isExternal ? ' <span class="badge bg-secondary-subtle text-secondary">ภายนอก</span>' : ''}
            <br><span class="text-muted" style="font-size:11.5px;"><i class="bi bi-tag-fill"></i> ${b.department || '-'}</span>
          </td>
          <td>${b.phone}</td>
          <td>
            <span class="badge" style="background-color: ${rColor}; color: white; font-weight:500;">
              ${roomName(b.roomId)}
            </span>
          </td>
          <td style="max-width: 250px;" class="text-truncate">${b.topic}</td>
          <td>${fmtDate(b.date)}</td>
          <td>${fmtTime(b)}</td>
          <td>${equipText(b.equipment)}</td>
          <td>${statusBadge(b.status)}</td>
          <td class="text-end text-nowrap">${actions}</td>
        </tr>
      `;
    }).join('');

    renderPaginationControls('apPagination', 'approval', totalItems, renderTable);
  };

  document.getElementById('ap_search').addEventListener('input', () => {
    PaginationState.approval.currentPage = 1;
    renderTable();
  });
  document.getElementById('ap_filter_status').addEventListener('change', () => {
    PaginationState.approval.currentPage = 1;
    renderTable();
  });
  document.getElementById('ap_filter_date').addEventListener('change', () => {
    PaginationState.approval.currentPage = 1;
    renderTable();
  });
  renderTable();

  window._apRenderTable = renderTable;
}

function approveBooking(id){
  Swal.fire({
    title: 'อนุมัติการจอง?',
    text: 'คุณต้องการอนุมัติรายการจองนี้ใช่หรือไม่',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'อนุมัติ',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#2f8f5b'
  }).then(async result => {
    if(result.isConfirmed){
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        await DB.updateBooking(id, { status: 'approved' });
        await Swal.fire({ icon: 'success', title: 'อนุมัติเรียบร้อย', timer: 1200, showConfirmButton: false });
        updatePendingBadge();
        window._apRenderTable && window._apRenderTable();
      } catch(err) {
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: err.message });
      }
    }
  });
}

// เพิ่มขั้นตอนระบุเหตุผลในการกดยกเลิกการจองโดยแอดมิน
function rejectBooking(id){

async function saveUser(e){
  e.preventDefault();
  const id = document.getElementById('u_id').value;
  const username = document.getElementById('u_username').value.trim();
  const fullname = document.getElementById('u_fullname').value.trim();
  const phone = document.getElementById('u_phone').value.trim();
  const department = document.getElementById('u_department').value;
  const role = document.getElementById('u_role').value;

  const users = DB.getUsers();
  
  // ตรวจสอบ username ซ้ำ
  const isDuplicate = users.some(u => String(u.username).toLowerCase() === username.toLowerCase() && String(u.id) !== String(id));
  if(isDuplicate){
    if (document.activeElement) document.activeElement.blur();
    Swal.fire({
      title: 'ไม่สามารถบันทึกได้', 
      text: 'ชื่อผู้ใช้งาน (Username) นี้มีในระบบแล้ว กรุณาใช้ชื่ออื่น', 
      icon: 'warning',
      target: document.getElementById('userModal')
    });
    return;
  }

  const btn = document.getElementById('btnSaveUser');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

  try {
    const userData = { username, fullname, phone, department, role };
    if(id){
      userData.id = id;
      if(GAS_URL) {
        await DB.fetchGAS('updateUser', userData);
      }
      const users = DB.getUsers();
      const idx = users.findIndex(u => String(u.id) === String(id));
      if(idx > -1) {
        users[idx] = { ...users[idx], ...userData };
        localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users));
      }
    } else {
      if(GAS_URL) {
        const created = await DB.fetchGAS('addUser', userData);
        userData.id = created.id;
      } else {
        userData.id = Date.now().toString();
      }
      const users = DB.getUsers();
      users.push(userData);
      localStorage.setItem(DB_KEYS.USERS, JSON.stringify(users));
    }
    
    const modal = bootstrap.Modal.getInstance(document.getElementById('userModal'));
    if (modal) modal.hide();
    
    // รีเซ็ต focus เพื่อแก้บั๊ก aria-hidden ของ Bootstrap
    document.body.focus();
    
    Swal.fire({icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false});
    if(window._usersRenderTable) window._usersRenderTable();
  } catch(err) {
    Swal.fire('ข้อผิดพลาด', err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'บันทึกข้อมูล';
  }
}

    title: 'ยืนยันการลบสมาชิก?',
    text: "ลบแล้วไม่สามารถกู้คืนได้ (ยกเว้นแก้ไขใน Google Sheet โดยตรง)",

async function saveRoom(){
  const id = document.getElementById('room_id').value;
  const name = document.getElementById('room_name').value.trim();
  const building = document.getElementById('room_building').value.trim();
  const floor = document.getElementById('room_floor').value.trim();
  const capacity = parseInt(document.getElementById('room_capacity').value) || 20;
  const color = document.getElementById('room_color').value;
  const status = document.getElementById('room_status').value;

  if(!name || !building || !floor){
    Swal.fire('ข้อมูลไม่ครบถ้วน', 'กรุณากรอกข้อมูลให้ครบทุกช่อง', 'warning');
    return;
  }

  const roomData = { name, building, floor, capacity, color, status };
  bootstrap.Modal.getInstance(document.getElementById('roomModal')).hide();
  Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  try {
    const rooms = DB.getRooms();
    if(id){
      // Update existing room
      const numId = parseInt(id);
      roomData.id = numId;
      if(GAS_URL) {
        await DB.fetchGAS('updateRoom', roomData);
      }
      const idx = rooms.findIndex(r => r.id === numId);
      if(idx !== -1) rooms[idx] = { ...rooms[idx], ...roomData };
    } else {
      // Add new room
      roomData.id = DB.nextId(rooms);
      if(GAS_URL) {
        const created = await DB.fetchGAS('addRoom', roomData);
        if(created && created.id) roomData.id = created.id;
      }
      rooms.push(roomData);
    }
    DB.setRooms(rooms);

    await Swal.fire({ icon: 'success', title: 'บันทึกข้อมูลห้องประชุมสำเร็จ', timer: 1200, showConfirmButton: false });
    window._roomsRenderTable && window._roomsRenderTable();
  } catch(err) {
    Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: err.message });
  }
}

function deleteRoom(id){

    icon: 'warning',

    confirmButtonText: 'ลบห้องประชุม',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#c1493e'

      Swal.fire({ title: 'กำลังลบข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        }

        DB.setRooms(rooms);

function renderReports(){
