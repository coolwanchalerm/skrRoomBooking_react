  const deptSelect = document.getElementById('rp_dept');
  if (deptSelect) {
    let deptHtml = '<option value="">ทุกกลุ่มงาน / บุคคลภายนอก</option>';
    depts.forEach(d => {
      deptHtml += `<option value="${d}">${d}</option>`;
    });
    deptHtml += '<option value="บุคคลภายนอก">หน่วยงานภายนอก</option>';
    deptSelect.innerHTML = deptHtml;
  }

  const renderTable = () => {
    const from = document.getElementById('rp_from').value;
    const to = document.getElementById('rp_to').value;
    const roomId = document.getElementById('rp_room').value;
    const dept = document.getElementById('rp_dept').value;
    const status = document.getElementById('rp_status').value;

    let rows = DB.getBookings().filter(b => {
      let ok = true;
      if(from) ok = ok && b.date >= from;
      if(to) ok = ok && b.date <= to;
      if(roomId) ok = ok && b.roomId === parseInt(roomId);
      if (dept) {
        if (dept === 'บุคคลภายนอก') {
          ok = ok && b.isExternal === true;
        } else {
          ok = ok && (!b.isExternal && b.department === dept);
        }
      }
      if(status) ok = ok && b.status === status;
      return ok;
    });
    rows = rows.sort((a,b) => new Date(a.date) - new Date(b.date));

    // คำนวณสถิติจาก rows ทั้งหมดที่กรองแล้ว (ไม่ขึ้นกับ empty check)
    calculateReportStats(rows);

    const tbody = document.querySelector('#rpTable tbody');
    const paginationEl = document.getElementById('rpPagination');
    if(rows.length === 0){
      tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">ไม่พบข้อมูล</td></tr>`;
      window._reportRows = [];
      if(paginationEl) paginationEl.innerHTML = '';
      return;
    }

    // ระบบจัดแบ่งหน้ารายการสำหรับตารางรายงาน (Report Pagination Split)
    const totalItems = rows.length;
    const state = PaginationState.reports;
    const startIndex = (state.currentPage - 1) * state.itemsPerPage;
    const paginatedRows = rows.slice(startIndex, startIndex + state.itemsPerPage);

    tbody.innerHTML = paginatedRows.map((b, i) => {
      const index = startIndex + i + 1;
      return `
        <tr>
          <td>${index}</td>
          <td>
            <strong>${(b.bookerName === "undefined" || !b.bookerName) ? "ไม่ระบุชื่อ" : b.bookerName}</strong>

// ฟังก์ชันคำนวณสถิติและตัวแปรรายงานสำคัญแบบ Real-time
function calculateReportStats(rows) {
  // 1. หาห้องประชุมที่ถูกจองใช้งานบ่อยสุดจากรายการที่แสดง
  const roomCounts = {};
  rows.forEach(b => {
    roomCounts[b.roomId] = (roomCounts[b.roomId] || 0) + 1;
  });
  let maxRoomId = null;
  let maxRoomCount = 0;
  for (const rid in roomCounts) {
    if (roomCounts[rid] > maxRoomCount) {
      maxRoomCount = roomCounts[rid];
      maxRoomId = parseInt(rid);
    }
  }
  const mostUsedRoomName = maxRoomId ? roomName(maxRoomId) : null;
  const mostUsedText = mostUsedRoomName
    ? `${mostUsedRoomName} (${maxRoomCount} ครั้ง)`
    : 'ไม่มีข้อมูล';
  document.getElementById('rpStatMostUsedRoom').textContent = mostUsedText;

  // 2. หาสังกัด/กลุ่มงานที่จองห้องเยอะที่สุดจากรายการที่แสดง
  const deptCounts = {};
  rows.forEach(b => {
    const key = b.isExternal ? 'บุคคลภายนอก' : (b.department || 'ไม่ระบุสังกัด');
    deptCounts[key] = (deptCounts[key] || 0) + 1;
  });
  let maxDeptName = null;
  let maxDeptCount = 0;
  for (const dname in deptCounts) {
    if (deptCounts[dname] > maxDeptCount) {
      maxDeptCount = deptCounts[dname];
      maxDeptName = dname;
    }
  }
  const mostActiveText = maxDeptName
    ? `${maxDeptName.replace('กลุ่มสาระการเรียนรู้', '').trim()} (${maxDeptCount} ครั้ง)`
    : 'ไม่มีข้อมูล';
  document.getElementById('rpStatMostActiveDept').textContent = mostActiveText;
}

// ใช้ระบบส่งออกไฟล์ผ่าน html2canvas เพื่อเรนเดอร์รูปภาพ HTML สวยงามลงหน้า PDF หมดห่วงเรื่องภาษาไทยเพี้ยน
function exportPDF(){
  const rows = window._reportRows || [];
  if(rows.length === 0){
    Swal.fire('ไม่มีข้อมูล', 'ไม่พบข้อมูลสำหรับการ Export', 'info');
    return;
  }

  Swal.fire({
    title: 'กำลังสร้างไฟล์ PDF...',
    text: 'ระบบกำลังเรนเดอร์ภาษาไทยให้สวยงามและถูกต้อง กรุณารอสักครู่',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  // แสดงแบนเนอร์ส่วนหัวหัวรายงานกระดาษชั่วคราว
  const printHeader = document.getElementById('reportHeaderPrint');
  printHeader.classList.remove('d-none');

  const reportArea = document.getElementById('reportPrintArea');

  html2canvas(reportArea, {
    scale: 2, // เพิ่มความละเอียดเพื่อความคมชัดของอักษร
    useCORS: true,
    backgroundColor: '#ffffff'
  }).then(canvas => {
    printHeader.classList.add('d-none'); // ซ่อนแบนเนอร์พิมพ์กลับตามเดิม

    const imgData = canvas.toDataURL('image/jpeg', 1.0);
    const { jsPDF } = window.jspdf;
    
    // ตั้งค่าขนาด PDF แนวตั้ง A4
    const pdf = new jsPDF('p', 'mm', 'a4');
    const imgWidth = 210; // ความกว้างกระดาษ A4 ในหน่วย มม.
    const pageHeight = 295; // ความสูงกระดาษ A4 ในหน่วย มม.
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft >= 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    pdf.save('รายงานการจองห้องประชุม_โรงเรียนสกลราชวิทยานุกูล.pdf');
    Swal.fire({ icon: 'success', title: 'สร้างไฟล์ PDF ภาษาไทยสำเร็จ', timer: 1200, showConfirmButton: false });
  }).catch(err => {
    console.error('PDF Export error: ', err);
    printHeader.classList.add('d-none');
    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถสร้าง PDF ได้ในขณะนี้', 'error');
  });
}

function exportExcel(){
  const rows = window._reportRows || [];
  if(rows.length === 0){
    Swal.fire('ไม่มีข้อมูล', 'ไม่พบข้อมูลสำหรับการ Export', 'info');
    return;
  }

  Swal.fire({ title: 'กำลังสร้างไฟล์ Excel...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  setTimeout(() => {
    const data = rows.map((b, i) => ({
      '#': i+1,
      'ผู้จอง': b.bookerName,
      'กลุ่มสาระฯ / ฝ่ายงาน / สังกัด': b.department || '-',
      'ประเภท': b.isExternal ? 'ภายนอก' : 'บุคลากรภายใน',
      'เบอร์โทร': b.phone,
      'ห้องประชุม': roomName(b.roomId),
      'หัวข้อ': b.topic,
      'วันที่': fmtDate(b.date),
      'เวลา': fmtTime(b),
      'อุปกรณ์': equipText(b.equipment),
      'สถานะ': STATUS_LABEL[b.status]
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Bookings');
    XLSX.writeFile(wb, 'booking-report.xlsx');

    Swal.fire({ icon: 'success', title: 'สร้างไฟล์ Excel สำเร็จ', timer: 1200, showConfirmButton: false });
  }, 500);
}

function printReport(){
  document.getElementById('reportHeaderPrint').classList.remove('d-none');
  window.print();
  setTimeout(() => document.getElementById('reportHeaderPrint').classList.add('d-none'), 500);
}

/* =========================================================
   CALENDAR PAGE
   ========================================================= */
let calViewYear, calViewMonth, calSelectedDate;

function renderCalendar(){
  const now = new Date();
  if(calViewYear === undefined){
    calViewYear = now.getFullYear();
    calViewMonth = now.getMonth();
    calSelectedDate = todayISO(0);
  }

  document.getElementById('calPrevMonth').addEventListener('click', () => {
    calViewMonth--;
    if(calViewMonth < 0){ calViewMonth = 11; calViewYear--; }
    buildCalendarGrid();
  });
  document.getElementById('calNextMonth').addEventListener('click', () => {
    calViewMonth++;
    if(calViewMonth > 11){ calViewMonth = 0; calViewYear++; }
    buildCalendarGrid();
  });
  document.getElementById('calToday').addEventListener('click', () => {
    const t = new Date();
    calViewYear = t.getFullYear();
    calViewMonth = t.getMonth();
    calSelectedDate = todayISO(0);
    buildCalendarGrid();
    renderCalendarDayList();
  });

  renderCalendarLegend();
  buildCalendarGrid();
  renderCalendarDayList();
}

function renderCalendarLegend(){
  const container = document.getElementById('calLegendContainer');
  if(!container) return;
  
  const rooms = DB.getRooms();
  let html = '';
  rooms.forEach(r => {
    const color = r.color || 'var(--gold)';
    html += `<span class="cal-legend-item"><span class="cal-dot" style="background:${color};"></span> ${r.name}</span>`;
  });
  html += `<span class="ms-auto d-none d-md-inline text-muted" style="font-size:12px;"><i class="bi bi-info-circle"></i> สามารถคลิกที่ชื่อรายการบนปฏิทินเพื่อดูรายละเอียดได้ทันที</span>`;
  
  container.innerHTML = html;
}

function buildCalendarGrid(){
  const thMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const dowLabels = ['อา','จ','อ','พ','พฤ','ศ','ส'];

  document.getElementById('calMonthLabel').textContent = `${thMonths[calViewMonth]} ${calViewYear + 543}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  dowLabels.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calViewYear, calViewMonth, 1);
  const startOffset = firstDay.getDay(); 
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();

  const bookings = DB.getBookings().filter(b => b.status !== 'cancelled');
  const todayStr = todayISO(0);

  for(let i=0; i<startOffset; i++){
    const el = document.createElement('div');
    el.className = 'cal-cell cal-empty';
    grid.appendChild(el);
  }

  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${calViewYear}-${String(calViewMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayBookings = bookings.filter(b => b.date === dateStr);

    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if(dateStr === todayStr) cell.classList.add('cal-today');
    if(dateStr === calSelectedDate) cell.classList.add('cal-selected');

    const numEl = document.createElement('div');
    numEl.className = 'cal-date-num';
    numEl.textContent = day;
    cell.appendChild(numEl);

    if(dayBookings.length > 0){
      const itemsContainer = document.createElement('div');
      itemsContainer.style.cssText = 'display:flex; flex-direction:column; gap:2.5px; margin-top:4px; overflow:hidden;';

      const limit = 2; 
      dayBookings.slice(0, limit).forEach(b => {
        const roomObj = DB.getRoomById(b.roomId);
        const color = roomObj ? (roomObj.color || 'var(--navy)') : 'var(--navy)';
        
        const banner = document.createElement('div');
        banner.style.cssText = `
          background-color: ${color};
          color: white;
          font-size: 10px;
          padding: 2.5px 5px;
          border-radius: 4px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          font-weight: 500;
          line-height: 1.2;
        `;
        const rShortName = roomObj ? roomObj.name.replace('ห้องประชุม', '') : 'ห้อง';
        banner.textContent = `${b.timeStart} ${rShortName}`;
        banner.title = `${b.topic} (${b.timeStart}-${b.timeEnd}) - ${b.bookerName}`;

        banner.addEventListener('click', (e) => {
          e.stopPropagation();
          viewBookingDetail(b.id);
        });

        itemsContainer.appendChild(banner);
      });

      cell.appendChild(itemsContainer);

      if(dayBookings.length > limit){
        const more = document.createElement('div');
        more.className = 'cal-more';
        more.style.cssText = 'font-size:9.5px; color: var(--muted); font-weight: bold; text-align: right; margin-top:1px;';
        more.textContent = `+${dayBookings.length - limit} รายการ`;
        cell.appendChild(more);
      }
    }

    cell.addEventListener('click', () => {
      calSelectedDate = dateStr;
      buildCalendarGrid();
      renderCalendarDayList();
    });

    grid.appendChild(cell);
  }
}

function renderCalendarDayList(){
  document.getElementById('calSelectedDateLabel').textContent = fmtDate(calSelectedDate);

  const bookings = DB.getBookings()
    .filter(b => b.date === calSelectedDate && b.status !== 'cancelled')
    .sort((a,b) => a.timeStart.localeCompare(b.timeStart));

  const tbody = document.querySelector('#calDayTable tbody');
  const empty = document.getElementById('calDayEmpty');

  if(bookings.length === 0){
    tbody.innerHTML = '';
    empty.classList.remove('d-none');
    return;
  }
  empty.classList.add('d-none');

  tbody.innerHTML = bookings.map(b => {
    const bRoom = DB.getRoomById(b.roomId);
    const rColor = bRoom ? (bRoom.color || 'var(--gold)') : 'var(--gold)';
    return `
      <tr style="cursor:pointer" onclick="viewBookingDetail(${b.id})">
        <td>${fmtTime(b)}</td>
        <td>
          <span class="badge" style="background-color: ${rColor}; color: white; font-weight:500;">
            ${roomName(b.roomId)}
          </span>
        </td>
        <td>
          <strong>${b.topic}</strong>
          ${b.department ? `<br><span class="text-muted" style="font-size:11px;"><i class="bi bi-tag-fill"></i> ${b.department}</span>` : ''}
        </td>
        <td>${b.bookerName}${b.isExternal ? ' <span class="badge bg-secondary-subtle text-secondary">ภายนอก</span>' : ''}</td>
        <td>${statusBadge(b.status)}</td>
      </tr>
    `;
  }).join('');
}
